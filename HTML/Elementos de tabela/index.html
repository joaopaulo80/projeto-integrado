<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos De Tabela</title>
</head>
<body>
    <h1>Elementos De Tabela</h1>
    <p>Os Elementos de tabela em HTML são usados para organizar
        dados em linhas e colunas, como uma planilha.
    </p>

    <table border="2">
        <caption>Tabela de Produtos</caption>
    <thead>
        <tr>
            <th>Produto</th>
            <th>Preço</th>
        </tr>
    </thead>
    <tbody>
      <tr> 
          <td>Teclado</td>
          <td>R$ 80,00</td>
       </tr>
    </tbody>
    <tfoot>
             <tr>
                 <td>Total</td>
                 <td>R$ 100,00</td>
            </tr>
        </tfoot>
    </table>    

    <!-- table = Define uma Tabela -->
    <!-- tr = (Table Row) Define uma linha -->
    <!--th = (Table Header) Define uma célula de cabeçalho -->
    <!--td = (Table Data) Define uma célula comum -->
    <!-- thead, tbody, tfoot = Estrutura Semantica da Tabela -->
</body>
</html>
