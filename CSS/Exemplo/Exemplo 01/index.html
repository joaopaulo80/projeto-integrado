<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello Word</title>
    <style> la
        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex;

           /* Centraliza horizontalmente o conteúdo */
            justify-content: center;

           /* Centraliza verticalmente o conteúdo */
            align-items: center;

          /*  Define altura como 100% da altura da tela */
            height: 100vh;

            /* Cor de fundo cinza claro  */
            background-color: #1f4a10;

            /* Define a fonte do texto */
             font-family: Outfit, sans-serif;
        }
        /* Estilos aplicados ao titulo (h1) */
        h1 {
            /* cor do texto */
            color: #000000;

            /* Tamanho da fonte (3 vezes o tamanho padrão) */
            font-size: 32px;

            /* Barra azul ao redor do texto */
            border: 6px double #fff;

            /* Espaçamento interno (topo/baixo = 20px, lados = 40px) */
            padding: 20px 40px;

            /* Arredondamento das bordas */
            border-radius: 50px;

           /* Fundo branco para destacar o texto */
            background-color: #fff
        }
    </style>
</head>
<body>
    <!-- Texto exibido no navegador -->
    <h1>Hello Word </h1>

</body>
</html>
